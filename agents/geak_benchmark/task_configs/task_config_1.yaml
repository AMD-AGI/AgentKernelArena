# ============================================================================
# Agent & Task Configuration
# ============================================================================

# Agent Template Selection
# Choose ONE agent template that defines how the LLM interacts with the system
# Available options:
# - cursor
# - codex
# - geak_optimagentv2
# - single_llm_call
# - SWE-agent
# - claude_code
# - geak_hip
# - openevolve
# - geak_ourllm_kernel2kernel
# - task_validator 
agent:
  template: geak_benchmark 

# Task Selection
# Specify task names to execute (use full path from tasks/ directory)
# Examples:
#   - hip2hip                           # All tasks under hip2hip
#   - triton2triton                     # All tasks under triton2triton
#   - torch2hip                         # All tasks under torch2hip
#   - hip2hip/silu                      # single task under hip2hip
#   - repository/rocprim/device_binary_search   # rocPRIM kernel
#   - repository/geak_eval/topk                 # Triton topk kernel
#   - repository/geak_eval/rope                 # Triton RoPE kernel
#   - repository/geak_eval/gemm                 # Triton GEMM kernel
#   - repository/geak_eval/fused_rms_fp8        # Triton fused RMS+FP8 kernel
#   - repository/geak_eval/fused_qkv_rope       # Triton fused QKV+RoPE kernel
#   - repository/geak_eval/ff_backward          # Triton gated MLP backward kernel
#   - all                               # Run ALL available tasks

tasks:
  - hip2hip/points_in_boxes
  - hip2hip/roiaware_pool3d
  - hip2hip/roipoint_pool3d
  - hip2hip/silu
  - hip2hip/three_interpolate
  - hip2hip/three_nn


target_gpu_model: MI308
log_directory: logs
workspace_directory_prefix: workspace_parallel
