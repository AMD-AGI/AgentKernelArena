task_type: hip2hip
source_file_path:
  - src/topk_per_row_kernels.cu
target_kernel_functions:
  - last_filter_kernel
  - radix_kernel
  - radix_topk_one_block_kernel
  - topk_per_row
  - topk_per_row_decode
compile_command:
  - python3 scripts/task_runner.py compile
correctness_command:
  - python3 scripts/task_runner.py correctness
performance_command:
  - python3 scripts/task_runner.py performance
prompt:
  instructions: "Optimize the per-row TopK HIP kernels for AMD MI300X GPU. These kernels implement radix-based top-k selection per row for both prefill and decode phases. Focus on radix sort efficiency, shared memory histogram operations, warp-level parallelism, and minimizing global memory traffic."

