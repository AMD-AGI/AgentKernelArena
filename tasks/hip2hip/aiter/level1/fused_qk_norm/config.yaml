task_type: hip2hip
source_file_path:
  - src/fused_qk_norm.cu
target_kernel_functions:
  - fused_qk_rmsnorm_kernel
compile_command:
  - python3 scripts/task_runner.py compile
correctness_command:
  - python3 scripts/task_runner.py correctness
performance_command:
  - python3 scripts/task_runner.py performance
prompt:
  instructions: "Optimize the fused QK RMSNorm HIP kernel (fused_qk_rmsnorm_kernel) for AMD MI300X GPU. This kernel fuses separate Q and K RMSNorm operations into a single kernel to reduce memory traffic. Focus on memory access patterns, vectorized loads/stores, and warp-level optimizations."
