task_type: triton_geak
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _attn_lean_tile
- find_group
- la_persistent_paged
prompt:
  instructions: Optimize the Lean Attention + Paged Attention Triton decode kernel
    for AMD MI300X GPU. The kernel uses persistent streaming-k with tile-level scheduling.
