task_type: triton_geak
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _dw_down_kernel
- _fused_dg_gating_kernel
- _fused_dw_up_kernel
- _fused_dx_kernel
prompt:
  instructions: Optimize the gated MLP (SwiGLU) backward pass Triton kernel for AMD
    MI300X GPU. The kernel computes gradients for gated feed-forward networks used
    in LLMs.
