task_type: triton_geak
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open("kernel.py").read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _fused_silu_mul_kernel
- _fused_add_kernel
prompt:
  instructions: Optimize the DeepSeek-style Mixture of Experts kernel for AMD MI325X
    GPU. The kernel implements gating (softmax + topk), routed expert dispatch with
    SiLU gated MLP, shared expert, and output accumulation. Focus on fusing expert
    computations and reducing memory traffic.
