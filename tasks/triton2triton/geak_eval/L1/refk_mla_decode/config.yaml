task_type: triton_geak
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open("kernel.py").read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _fused_rope_kernel
- _fused_softmax_kernel
prompt:
  instructions: Optimize the MLA (Multi-head Latent Attention) decode kernel for AMD
    MI325X GPU. The kernel implements DeepSeek-style MLA with RoPE, KV cache, and
    attention. Focus on fusing projections, optimizing RoPE, and reducing memory traffic.
