task_type: triton_geak
source_file_path:
- kernel.py
harness_path: test_kernel_harness.py
compile_command:
- python3 -c "import ast; ast.parse(open('kernel.py').read())"
correctness_command:
- python3 test_kernel_harness.py --correctness
performance_command:
- python3 test_kernel_harness.py --full-benchmark
target_kernel_functions:
- _fused_attn_fwd_kernel
- _block_compress_fwd
- _comp_attn_fwd_kernel
prompt:
  instructions: Optimize the Native Sparse Attention (NSA) forward Triton kernel for
    AMD MI300X GPU. The kernel implements block compression and fused attention for
    sparse attention patterns.
